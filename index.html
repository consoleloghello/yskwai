<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>综合题库</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        canvas: '#f7f6f3',
        surface: '#fff',
        ink:   { DEFAULT: '#1c1b19', muted: '#7f7b73', faint: '#a8a399' },
        line:  '#ebe8e2',
        primary: { DEFAULT: '#4f46e5', soft: '#eef0fb', ring: '#c7c9f5' },
        ok:   '#15803d', okSoft: '#ecf5ef',
        err:  '#dc2626', errSoft: '#fdeeec',
        warn: '#b45309', warnSoft: '#fdf3e3',
      },
      boxShadow: {
        soft:  '0 1px 2px rgba(40,38,34,.04), 0 0 0 1px rgba(40,38,34,.03)',
        float: '0 6px 20px -6px rgba(40,38,34,.10)',
      },
    }
  }
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --canvas:#f7f6f3;--surface:#fff;--line:#ebe8e2;
  --primary:#4f46e5;--primary-soft:#eef0fb;--primary-ring:#c7c9f5;
  --text:#1c1b19;--text2:#7f7b73;--text3:#a8a399;
  --success:#15803d;--success-soft:#ecf5ef;
  --error:#dc2626;--error-soft:#fdeeec;
  --warn:#b45309;--warn-soft:#fdf3e3;
  --border:#ebe8e2; /* 别名：JS 内联沿用 var(--border) */
  --radius:12px;--shadow:0 1px 2px rgba(40,38,34,.04),0 0 0 1px rgba(40,38,34,.03);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-tap-highlight-color:transparent;letter-spacing:-.01em}
input,textarea,button{font:inherit}
:focus-visible{outline:2px solid var(--primary-ring);outline-offset:1px}
.no-scrollbar{scrollbar-width:none;-ms-overflow-style:none}
.no-scrollbar::-webkit-scrollbar{display:none}
@keyframes blink{50%{opacity:.4}}
.blink{animation:blink 1s infinite}

/* —— JS 通过 classList 切换的状态，保留在 CSS 中 —— */
#exam-overlay{display:none} #exam-overlay.active{display:flex}
.score-overlay{display:none} .score-overlay.active{display:flex}
.update-overlay{opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.update-overlay.active{opacity:1;visibility:visible}
.update-card{transform:translateY(12px);transition:transform .2s cubic-bezier(.16,1,.3,1)}
.update-overlay.active .update-card{transform:translateY(0)}

/* 顶部模式切换按钮：仅一个主色 lock */
.mode-toggle button{transition:background .15s,color .15s,opacity .15s}
.mode-toggle button.active{background:var(--primary);color:#fff;box-shadow:0 1px 3px rgba(79,70,229,.28)}

/* 筛选标签 */
.section-tabs button,.sub-tabs button{flex-shrink:0;padding:7px 14px;border:1px solid var(--line);border-radius:10px;font-size:13px;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s;white-space:nowrap}
.sub-tabs button{font-size:12px;padding:5px 12px}
.section-tabs button:hover,.sub-tabs button:hover{border-color:var(--primary-ring);color:var(--text)}
.section-tabs button.active,.sub-tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* 卡片：去浮华、单一主色头、可 hover */
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:box-shadow .18s,border-color .18s}
.card:hover{box-shadow:0 4px 14px -6px rgba(40,38,34,.12);border-color:#dedad2}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;background:var(--primary-soft);border-bottom:1px solid rgba(79,70,229,.08)}
.card-tag{font-size:11px;font-weight:600;color:var(--primary);padding:3px 9px;background:#fff;border:1px solid rgba(79,70,229,.16);border-radius:7px;letter-spacing:.01em}
.card-num{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums}
.card-body{padding:14px 15px}
.card-q{font-size:15px;line-height:1.65;color:var(--text);margin-bottom:12px;text-wrap:pretty}

/* 答案块 */
.card-a{display:none;color:var(--success);background:var(--success-soft);border-radius:10px;padding:11px 14px;margin-top:4px;font-size:14px;line-height:1.65}
.card-a.visible{display:block}
.card-a .label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--success);margin-bottom:5px;display:block;text-transform:uppercase}

/* 判断题按钮 */
.tf-btns{display:flex;gap:10px;margin-top:8px}
.tf-btn{flex:1;padding:15px;border:1.5px solid var(--line);border-radius:12px;font-size:20px;font-weight:800;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s}
.tf-btn:hover{border-color:var(--primary-ring);color:var(--text)}
.tf-btn:active{transform:scale(.97)}
.tf-btn.correct{border-color:var(--success);background:var(--success-soft);color:var(--success)}
.tf-btn.wrong{border-color:var(--error);background:var(--error-soft);color:var(--error)}

/* “显示答案”按钮 */
.reveal-btn{display:inline-flex;align-items:center;gap:6px;margin-top:6px;padding:8px 16px;border:1px solid var(--line);border-radius:10px;font-size:13px;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s}
.reveal-btn:hover{border-color:var(--primary-ring);color:var(--primary)}
.reveal-btn:active{background:var(--canvas)}

/* 考试卡片 */
.exam-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;padding:16px;box-shadow:var(--shadow)}
.exam-q-num{font-size:12px;font-weight:600;color:var(--primary);margin-bottom:8px;letter-spacing:.01em}
.exam-q-text{font-size:15px;line-height:1.65;margin-bottom:12px;text-wrap:pretty}
.exam-timer.warning{color:var(--error);animation:blink 1s infinite}

/* 空状态 */
.empty-state{text-align:center;padding:72px 20px;color:var(--text2)}
.empty-state svg{width:46px;height:46px;margin:0 auto 14px;opacity:.28;display:block}
</style>
</head>
<body class="bg-canvas text-ink min-h-[100dvh]">
<div id="updateOverlay" class="update-overlay fixed inset-0 z-[400] bg-black/40 backdrop-blur-[2px] flex items-center justify-center p-5">
<div class="update-card bg-surface rounded-2xl px-6 py-6 w-full max-w-[340px] text-center shadow-float">
<div class="update-icon w-12 h-12 mx-auto mb-3.5 rounded-full bg-primary-soft flex items-center justify-center text-primary">
<svg class="w-[26px] h-[26px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22h20L12 2z"/><path d="M12 9v5"/><circle cx="12" cy="18" r="0.5" fill="currentColor"/></svg>
</div>
<h2 class="text-[17px] font-bold mb-2.5 tracking-tight">已有新版本</h2>
<p class="text-sm leading-relaxed text-ink-muted mb-2">本系统已迁移至新地址，建议前往新版本使用。</p>
<p class="text-sm leading-relaxed text-ink-muted mb-2">新版本整合了最新版题库（外操版与内操版），登录账号还可以使用云端同步错题，云端同步笔记。</p>
<a id="updateLink" class="update-link inline-block text-primary font-semibold text-sm no-underline px-3 py-1.5 border border-primary rounded-[10px] my-1.5 break-all transition-colors hover:bg-primary-soft active:bg-primary-soft" href="https://consoleloghello.github.io/yskdocu/" target="_blank" rel="noopener">https://consoleloghello.github.io/yskdocu/</a>
<p class="update-note text-xs text-ink-muted mb-4"><strong>当前项目依旧可用，您可继续使用本页面。</strong></p>
<button class="w-full py-2.5 border-none rounded-[12px] text-[15px] font-semibold cursor-pointer bg-primary text-white transition-all hover:opacity-90 active:scale-[.98]" onclick="closeUpdate()">知道了</button>
</div>
</div>

<header class="sticky top-0 z-[100] bg-surface border-b border-line px-3">
<div class="header-top flex items-center gap-2 py-2.5">
<h1 class="text-[17px] font-bold whitespace-nowrap text-primary tracking-tight">综合题库</h1>
<div class="search-wrap flex-1 relative">
<svg class="absolute left-[11px] top-1/2 -translate-y-1/2 w-[18px] h-[18px] text-ink-faint" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
<input type="search" id="search" placeholder="搜索题目..." class="w-full h-10 pl-9 pr-3 border border-line rounded-[10px] text-[15px] bg-canvas outline-none transition-colors placeholder:text-ink-faint focus:border-primary">
</div>
<div class="mode-toggle flex bg-canvas rounded-[12px] p-0.5 gap-0">
<button id="btnBrowse" class="px-3.5 py-2 border-none rounded-[9px] text-[13px] font-semibold cursor-pointer bg-transparent text-ink-muted transition-all whitespace-nowrap hover:text-ink active">浏览</button>
<button id="btnPractice" class="px-3.5 py-2 border-none rounded-[9px] text-[13px] font-semibold cursor-pointer bg-transparent text-ink-muted transition-all whitespace-nowrap hover:text-ink active">练习</button>
<button id="btnExam" class="ml-1 px-3.5 py-2 border-none rounded-[9px] text-[13px] font-semibold cursor-pointer bg-primary text-white transition-all whitespace-nowrap hover:opacity-90 active:scale-[.98]">考试</button>
</div>
</div>
</header>
<nav class="px-3">
<div id="secTabs" class="section-tabs no-scrollbar flex gap-1 overflow-x-auto py-1.5"></div>
<div id="subTabs" class="sub-tabs no-scrollbar flex gap-1 overflow-x-auto py-1.5"></div>
</nav>
<div class="info-bar flex items-center justify-between px-4 py-2.5 text-[13px] text-ink-muted"><span id="info"></span></div>
<main id="list" class="px-2 pb-[100px]"></main>

<div id="exam-overlay" class="fixed inset-0 z-[200] bg-canvas flex-col overflow-y-auto">
<div class="sticky top-0 z-10 bg-surface border-b border-line px-4 py-3 flex items-center justify-between gap-2">
<button class="btn-cancel shrink-0 px-4 py-2 text-[13px] rounded-[10px] bg-canvas text-ink-muted border border-line transition-colors hover:text-ink hover:border-ink-faint" onclick="closeExam()">退出</button>
<div><span id="examTimer" class="exam-timer text-xl font-bold text-primary tabular-nums tracking-tight">30:00</span></div>
<div id="examProgress" class="text-[13px] text-ink-muted tabular-nums">0/0</div>
<div class="flex gap-1.5">
<button class="btn-cancel px-3 py-2 text-[13px] rounded-[10px] bg-canvas text-ink-muted border border-line transition-colors hover:text-ink hover:border-ink-faint" onclick="examPrev()">上一题</button>
<button class="btn-cancel px-3 py-2 text-[13px] rounded-[10px] bg-canvas text-ink-muted border border-line transition-colors hover:text-ink hover:border-ink-faint" onclick="examNext()">下一题</button>
</div>
</div>
<div id="examBody" class="flex-1 py-3 px-2"></div>
<div id="examFoot" class="sticky bottom-0 bg-surface border-t border-line px-4 py-3 flex gap-2">
<button class="btn-cancel flex-1 py-3 border rounded-[12px] text-[15px] font-semibold cursor-pointer bg-canvas text-ink-muted transition-colors hover:text-ink hover:border-ink-faint" onclick="closeExam()">退出</button>
<button class="btn-submit flex-1 py-3 border-none rounded-[12px] text-[15px] font-semibold cursor-pointer bg-primary text-white transition-all hover:opacity-90 active:scale-[.98]" onclick="submitExam()">交卷</button>
</div>
</div>

<div id="scoreOverlay" class="score-overlay fixed inset-0 z-[300] bg-black/40 backdrop-blur-[2px] items-center justify-center p-5">
<div class="score-card bg-surface rounded-2xl p-7 w-full max-w-[360px] text-center shadow-float">
<div class="text-xs font-semibold text-primary mb-2 tracking-wide">模拟考试成绩</div>
<div id="scoreNum" class="score-num text-5xl font-extrabold text-primary tracking-tight tabular-nums">0%</div>
<div id="scoreDetail" class="score-detail text-sm text-ink-muted mt-2 mb-5"></div>
<button class="px-8 py-2.5 border-none rounded-[12px] text-sm font-semibold cursor-pointer bg-primary text-white m-1 transition-all hover:opacity-90 active:scale-[.98]" onclick="closeScore()">返回</button>
<button class="btn-outline bg-transparent text-primary border border-primary px-8 py-2.5 rounded-[12px] text-sm font-semibold cursor-pointer m-1 transition-colors hover:bg-primary-soft active:bg-primary-soft" onclick="viewAnswers()">查看答案</button>
</div>
</div>

<script>
var DATA={"地面火炬":{"选择题":[{"q":"地面火炬系统不能处理以下哪种气体？（    ）","answer":"B. 极度或高度危害的有毒气体"},{"q":"地面火炬系统中，用于分离和储存液体的设备是（    ）","answer":"C. 分液罐"},{"q":"地面长明灯组件头部设引射喷嘴、防风罩，其作用不包括（    ）","answer":"D. 提高放空气燃烧效率"},{"q":"高能点火装置采用的点火原理是（    ）","answer":"A. 半导体表面压沿面放电原理"},{"q":"水封罐的作用不包括（    ）","answer":"C. 分离放空气中的液体"},{"q":"蒸汽引进时，打开疏水器旁路阀的目的是（    ）","answer":"C. 暖管"},{"q":"树杈型地面火炬燃烧器的布置方式为（    ）","answer":"B. 等边三角形布置"},{"q":"高能点火系统由（    ）组成","answer":"D. 点火器控制箱、防爆点火枪和至点火枪的高压电缆"},{"q":"高能点火系统运行前，用摇表测量绝缘电阻后，还应进行（    ）","answer":"B. 耐压试验"},{"q":"地面长明灯手动点火前，必须确认（    ）","answer":"A. 装置无放空气及挡风墙内无可燃性气体聚积"},{"q":"分级燃烧时，放空气第1级燃烧系统管线（    ）","answer":"A. 常开"},{"q":"当放空气总管压力>快速开阀压力（全开压力）时，各级气动火炬阀（    ）","answer":"B. 同时打开"},{"q":"分液罐凝液通过（    ）实现高液位手动启动泵排凝，低液位自动停泵功能","answer":"A. 液位变送器"},{"q":"水封罐水封高度通过（    ）来控制","answer":"C. 自动补水和高液位溢流"},{"q":"地面长明灯常燃时，燃料气操作压力一般为（    ）","answer":"B. 50 - 80kPa"},{"q":"火炬系统停氮气后，操作人员应（    ）","answer":"A. 加强放空气管道压力监控"}],"填空题":[{"q":"地面火炬系统一般包含分级燃烧系统、点火系统、氮气吹扫系统、______等。","answer":"蒸汽消烟系统"},{"q":"地面火炬燃烧器出口设有若干套地面长明灯，地面长明灯由______提供燃料气。","answer":"相对稳定的供气源"},{"q":"燃烧炉本体内表面全部内衬模块式隔热材料，能承受______的高温。","answer":"1200℃"},{"q":"分液罐可分离出放空气直径大于______的液滴。","answer":"600μm"},{"q":"氮气用作放空气管线吹扫介质，防止空气倒流，以免______现象产生。","answer":"回火"},{"q":"蒸汽引进时，微开蒸汽总阀，引入蒸汽进行暖管，待各疏水器的旁路阀排出蒸汽后，关闭旁路阀，改用______。","answer":"疏水器"},{"q":"仪表气用作各气动阀的仪表气源，由______引入。","answer":"仪表气管网"},{"q":"燃料气一般采用液化气或天然气，有时装置开车后会使用热值低的______，须确认燃料气组分及压力。","answer":"煤气"},{"q":"火炬系统停风时，供风系统因故停风，应立即将所有开启状态的气动阀切换至______状态位置。","answer":"手动"},{"q":"对于热值低、不易完全燃烧、不易点燃的放空气，地面火炬燃烧器还会采用______地面火炬燃烧器形式。","answer":"蓄热式"},{"q":"高能点火系统由点火器控制箱、防爆点火枪和______组成。","answer":"至点火枪的高压电缆"},{"q":"高能点火器控制箱为实现高能电打火所需的电气元件主要安装在该控制箱内，因控制箱安装在爆炸危险区域，控制箱为______控制箱。","answer":"隔爆"},{"q":"分级燃烧时，若放空气总管压力>开阀压力时，各级气动切断阀相应自动逐级打开，对应的各级燃烧器投入运行；当某一级气动阀切断阀故障无法打开，直接跳至下一级燃烧系统，打开下一级气动切断阀，每级气动切断阀均设有旁路**爆破片______**以确保排放安全、及时。","answer":"或爆破针型阀"},{"q":"一般放空气至界区的相对压力______，原则上，分级燃烧系统的开阀压力应参考放空气到界区的相对压力，但是氢气组分的放空气开阀压力宜______。","answer":"≤50kPa、≤20kPa"},{"q":"分液罐设液位变送器，将分液罐的液位信号送至______，通过液位信号实现分液罐高液位手动启动泵排凝，低液位自动停泵功能。","answer":"PLC"},{"q":"水封罐上设液位变送器，液位信号送至______，通过液位信号控制新鲜水管线上气动切断阀______的开关，使水封罐保持一定的液位。","answer":"DCS、调节阀"},{"q":"地面长明灯常燃时，应重点关注地面长明灯燃料气压力，确保减压阀后压力处于正常控制范围内，同时地面长明灯燃料气宜选用______或其它清洁燃料气。","answer":"天然气"},{"q":"如因长期无放空气，各气动阀将长期处于关闭状态，此时应对气动阀进行人为的强制开/关阀门操作，具体实施时可在无放空气排放时，______通过控制柜进行开启、关闭动作一次，以检测阀门是否完好。","answer":"每周一次"},{"q":"消烟蒸汽的管道应加强脱水管理，并保持蒸汽控制阀后的管道处于______状态，防止产生水击。","answer":"热备"}],"判断题":[{"q":"地面火炬系统可以处理所有工况下排放的放空气。","answer":"×"},{"q":"地面长明灯的作用只是为了点燃放空气，没有其他功能。","answer":"×"},{"q":"高能点火装置点火时，输出2500V高能电压至半导体电咀，产生高能量火花，引燃燃料气。","answer":"√"},{"q":"分液罐只需要设置就地液位计即可。","answer":"×"},{"q":"水封罐补水管道上的速断阀（或调节阀）可根据水封液位情况或放空气信号自动补水。","answer":"√"},{"q":"树杈型地面火炬燃烧器布置方式为矩形布置。","answer":"×"},{"q":"地面长明灯手动点火时，不需要确认装置无放空气及挡风墙内无可燃性气体聚积。","answer":"×"},{"q":"分级燃烧时，当放空气总管压力>开阀压力时，所有气动切断阀同时打开。","answer":"×"},{"q":"分液罐凝液只能通过手动方式排出。","answer":"×"},{"q":"水封罐水封高度只需要通过自动补水控制即可。","answer":"×"},{"q":"地面长明灯常燃时，不需要关注燃料气压力。","answer":"×"},{"q":"长期无放空气时，无需对气动阀进行强制开/关阀门操作。","answer":"×"},{"q":"消烟蒸汽管道不需要进行脱水管理。","answer":"×"},{"q":"火炬系统停风时，无需对水封罐气动补水调节阀进行操作。","answer":"×"}],"简答题":[{"q":"简述地面火炬系统的工作流程。","answer":"放空气体经管道、阀门、分液罐、防回火装置（水封罐或阻火器）输送至地面火炬燃烧器。地面火炬燃烧器出口设有若干套地面长明灯，地面长明灯由相对稳定的供气源提供燃料气。地面长明灯经点火装置点燃后保持燃烧，放空气立即被地面长明灯点燃，从而实现放空气燃烧排放的目的。"},{"q":"请阐述分级燃烧的压力控制方式及注意事项。","answer":"分级燃烧的压力控制方式： o\t逐级开启状态：第1级燃烧器常开；第2级及以后，若放空气总管压力>开阀压力时，相应级气动阀自动打开投入运行，当总管压力<关阀压力且下一级切断阀已关闭超过15s后，该级气动阀自动关闭。 o\t全开状态：当放空气总管压力>快速开阀压力（全开压力）时，各级气动火炬阀同时打开。 o\t跳级开阀状态：当某一气动阀开阀故障，且放空气总管压力>跳级开阀压力时，需直接跳至下一级气动阀。 注意事项： （1）爆破片爆破后应及时更换； （2）操作人员应注意各阀门的操作控制要求与状态回讯是否一致，若不一致应及时检修故障阀门； （3）长期无放空气时，每周一次通过控制柜对气动阀进行开启、关闭动作检测； （4）长期有放空气排放时，每周一次在专人指挥下，先关闭气动阀前手动阀，再在控制柜上操作阀门开启、关闭动作检测，且不能在所有燃烧器均打开时进行； （5）对阀门的检测动作只能一台一台进行，且要快速完成，不影响火炬系统正常运行及安全。"},{"q":"火炬系统停氮气后应采取哪些措施？","answer":"火炬停氮气后，操作人员必须加强放空气管道压力监控。如若有停氮气的风险，应考虑增设氮气瓶作为备用。"}]},"给水加压泵站":{"选择题":[{"q":"给水加压泵站的生产消防水罐总水量为（    ）","answer":"C. 19620m³"},{"q":"生产消防水罐单罐补水管管径为（    ）","answer":"B. DN400"},{"q":"低压生产水泵的流量为（    ）","answer":"A. 550m³/h"},{"q":"生活水供水泵的扬程为（    ）","answer":"B. 55米"},{"q":"稳高压消防水系统设计规模为（    ）","answer":"D. 675L/s"},{"q":"生活水水源来自（    ）","answer":"B. 园区供水管网"},{"q":"低压生产水平时由（    ）直供","answer":"A. 市政供水利用余压和厂区回用水"},{"q":"高压生产水是将储存于（    ）内的生产水经高压生产水泵加压","answer":"B. 生产消防水罐"},{"q":"稳高压消防给水系统工作压力为（    ））","answer":"B. 0.8 - 1.1MPa（G"},{"q":"生活水箱液位计（位号LT - 00501）与（    ）联锁","answer":"A. 补水电磁阀"},{"q":"当生活水管网压力PIS00501降至≤（    ）时，联锁启动生活给水泵31300 - PA001 - 1AX","answer":"A. 0.50MPa"},{"q":"生活给水泵31300 - PA001 - 1CX为（    ）","answer":"B. 备用泵"},{"q":"消防稳压泵正常工作时将管网压力维持在（    ））","answer":"B. 0.80 - 0.90MPa（G"},{"q":"当消防管网上压力变送器监测到管网压力下降至（    ））时启动消防电泵","answer":"A. 0.75MPa（G"},{"q":"消防柴油泵为消防电泵的备用泵，当3台电泵依次启动后但管网压力仍低于（    ））时，自动启动第一台消防柴油泵","answer":"B. 1.0MPa（G"},{"q":"消防水泵出水总管设安全泄压管路，当管网压力升至（    ）时自动开启泄压阀泄压","answer":"B. 1.35MPa"},{"q":"消防水系统采用稳高压制，当管网压力下降至设定值（    ）以下时，自动控制柜接到“压力降低”信号，启动稳压泵","answer":"A. 0.78MPaG"},{"q":"给水加压泵站消防泵稳压控制目标是确保消防水（    ）运行","answer":"C. 稳压状态"},{"q":"电动消防泵开启后，在确认无单位用水的情况下，应将操作箱上开关及泵PLC控制柜联锁按钮（    ）","answer":"B. 由自动扳到手动"},{"q":"低压生产水泵稳压控制是为了保证（    ）液位处于较高位置","answer":"C. 循环水场"}],"填空题":[{"q":"给水加压泵站设有生产用水及消防用水共用水罐，泵站内共设水罐______座，单座设计有效容积______m³。","answer":"2、9923.3"},{"q":"生产消防水罐消防储水量为______m³，生产给水储水量为______m³。","answer":"14580、5040"},{"q":"生产水供水泵分为______和______，分别为全厂提供低压生产水和高压生产水。","answer":"低压生产水泵、高压生产水泵"},{"q":"生活水采用______式加压供水设备，供水能力为______。","answer":"水箱、25 - 50m³/h"},{"q":"稳高压消防水系统火灾延续时间为______h，每台柴油泵自带柴油箱，容积能满足机组连续运转______小时的要求。","answer":"6、6"},{"q":"生活水水质需满足《生活饮用水卫生标准》______。","answer":"GB5749 - 2022"},{"q":"低压生产水供水管管径为______，从泵棚南侧送出界区并接至循环水场。","answer":"DN300"},{"q":"高压生产水泵从泵棚南侧送出______供水管，先上管廊，然后通过管廊送至各用水点。","answer":"DN150"},{"q":"稳高压消防给水系统由生产消防水罐、消防水泵、消防水稳压泵、供水管网、______及其他有关设施组成。","answer":"阀门"},{"q":"生活水箱液位达到HH时______补水电磁阀，水位下降至H时______补水电磁阀。","answer":"关闭、打开"},{"q":"当生活水管网压力PIS00501降至≤0.40MPa时，联锁启动生活给水泵______。","answer":"31300 - PA001 - 1BX"},{"q":"生活给水泵3台泵可自动实现切换，切换时间不超过______s。","answer":"10"},{"q":"消防稳压泵A泵为主泵，B泵为备泵，当A泵故障时自动启动______泵；任意一台稳压泵运行______h，自动切换至另一台泵。","answer":"B、40"},{"q":"当第一台消防电泵启动30S______后，若管网压力仍低于______MPa______自动启动第二台消防电泵。","answer":"可调、1.0、G"},{"q":"消防水泵进出口管道上的电动阀均为______阀，电源故障时阀门应处于______状态。","answer":"常开、全开"},{"q":"消防水系统中，当管网压力上升至0.90MPaG以上，延时______秒，稳压泵自动停止工作。","answer":"0 - 15"},{"q":"给水加压泵站消防泵稳压控制时，维持管网压力在______MPa左右。","answer":"0.8 - 0.9"},{"q":"电动消防泵开启后，停止电动泵或柴油泵后，管网压力______MPa时，将电动泵或柴油泵投入自动状态。","answer":"≥0.8"},{"q":"低压生产水泵在市政供水压力不足或循环水场低液位报警时开启。","answer":""},{"q":"高压生产水泵当管网压力降至≤0.45MPa时，联锁启动。","answer":""}],"判断题":[{"q":"给水加压泵站只负责提供生产水和消防水。","answer":"×"},{"q":"生产消防水罐两个水罐相互独立，不连通。","answer":"×"},{"q":"生活水供水泵不是变频泵。","answer":"×"},{"q":"低压生产水任何时候都由给水加压泵站的低压生产水泵供应。","answer":"×"},{"q":"高压生产水是由园区供水管网直接提供给各用水点。","answer":"×"},{"q":"稳高压消防水系统不需要稳压泵。","answer":"×"},{"q":"生活水水源来自厂区回用水。","answer":"×"},{"q":"生活水箱液位信息不需要远传至DCS。","answer":"×"},{"q":"当生活水管网压力≥0.6MPa时，生活给水泵停泵。","answer":"√"},{"q":"消防稳压泵正常工作时，A泵和B泵同时运行。","answer":"×"},{"q":"当消防管网上压力变送器监测到管网压力下降至0.85MPa（G）时启动消防电泵。","answer":"×"},{"q":"消防柴油泵在任何情况下都不会自动启动。","answer":"×"},{"q":"消防水泵出水总管设安全泄压管路，当管网压力降至1.35MPa时自动关闭泄压阀。","answer":"×"},{"q":"消防水系统中，当管网压力下降至0.75MPaG以下，自动控制柜接到信号，立即自动启动第1台电动消防泵。","answer":"√"},{"q":"火灾结束后，消防水泵会自动停止。","answer":"×"},{"q":"给水加压泵站消防泵稳压控制时，31300 - P002A/B泵出口阀应处于关闭状态。","answer":"×"},{"q":"电动消防泵开启后，在任何情况下都不能手动操作。","answer":"×"},{"q":"低压生产水泵稳压控制与循环水场液位无关。","answer":"×"},{"q":"高压生产水泵当水罐内液位下降到低液位（L）时，联锁停泵，是为了保证不动用消防水。","answer":"√"}],"简答题":[{"q":"简述生活给水系统的工艺原理及供水流程。","answer":"生活给水系统主要为工艺装置和公用工程及辅助设施操作人员提供生活用水，水质需满足《生活饮用水卫生标准》GB5749 - 2022。生活水水源由园区供水管网提供，采用水箱式加压供水设备。生活水先进入生活水箱，水箱自带液位计，液位计与补水电磁阀联锁控制水箱水位。当生活水管网压力下降时，通过联锁启动生活给水泵，生活给水泵从生活水箱吸水加压，将水通过DN100管线从泵棚引出，经管廊送至各用水区域，各用水区域压力≥0.45MPa。同时，生活给水泵供水总管的支管上设有超压回流管，当管道压力≥0.7MPa时打开回流控制阀，以稳定管网压力，管网压力信息远传至DCS，DCS控制室可远程手动控制生活给水泵的开关，泵运行状态也在DCS显示。"},{"q":"说明稳高压消防给水系统的组成及工作原理。","answer":"稳高压消防给水系统由生产消防水罐、消防水泵、消防水稳压泵、供水管网、阀门及其他有关设施组成。其工作原理是储存在生产消防水罐内的消防水，在正常情况下，由消防稳压泵将管网压力维持在0.80 - 0.90MPa（G），保证消防管网处于稳压状态。当发生火灾，管网压力下降，设置在消防管网上的压力变送器监测到管网压力下降至0.75MPa（G）时，启动消防电泵，同时关闭消防稳压泵。若第一台泵启动30S（可调）后管网压力仍低于1.0MPa（G），自动启动第二台消防电泵；若第二台水泵启动30S（可调）后管网压力仍继续下降或低于1.0MPa（G），自动启动第三台消防电泵。若3台电泵依次启动后管网压力仍低于1.0MPa（G），则自动启动消防柴油泵。消防电泵和消防柴油泵出水总管设安全泄压管路，当管网压力升至1.35MPa时自动开启泄压阀泄压，降至1.2MPa时自动关闭泄压阀，以确保管网安全，系统工作压力为0.8 - 1.1MPa（G）。"},{"q":"简述低压生产水泵的启动条件及控制过程。","answer":"低压生产水泵的启动条件是市政供水压力不足或循环水场低液位报警。平时，循环水场的低压生产水由市政供水利用余压直供和厂区回用水直供。当出现上述启动条件时，开启低压生产水泵（31300 - P004A），其流量为550m³/h，扬程30米，供水管管径为DN300，从泵棚南侧送出界区并接至循环水场。在运行过程中，当水罐内液位下降到低液位（L）时，联锁停泵，以保证不动用消防水，从而实现对循环水场液位的控制，保证其处于较高位置。"}]},"罐区":{"选择题":[{"q":"罐组一设置的4000m³混合碳五储罐共有多少座？（    ）","answer":"B. 7座"},{"q":"混合碳五储罐TK103储存的物料主要来自哪里？（    ）","answer":"A. 碳五分离装置"},{"q":"罐组二的地下污油储罐容量为多少？（    ）","answer":"A. 5m³"},{"q":"罐组四的乙腈储罐类型为？（    ）","answer":"A. 内浮顶罐"},{"q":"丁二烯储罐TK501A/B的阻聚剂补充来源是？（    ）","answer":"A. 弹性体装置"},{"q":"倒罐操作中，收料罐的流程需打通至哪个设备？（    ）","answer":"A. 装车泵"},{"q":"停工检修时，球罐内可燃气体浓度需通过什么方式检测？（    ）","answer":"C. 气体分析"},{"q":"苯乙烯储罐的切水操作通过哪个设备进行？（    ）","answer":"B. 切水器"},{"q":"混合碳五储罐的容量不包括以下哪种？（    ）","answer":"D. 5000m³"},{"q":"混合碳五泵（P101A/B）的输送目的地是：（    ）","answer":"A. 碳五分离装置"},{"q":"异戊二烯装车泵（P202）的功能不包括：（    ）","answer":"B. 输送至弹性体装置"},{"q":"乙腈储罐（TK405A/B）的容量为：（    ）","answer":"B. 480m³"},{"q":"苯乙烯储罐（TK403A/B）的罐体类型是：（    ）","answer":"C. 固定顶罐"},{"q":"丁二烯储罐储存的丁二烯通过丁二烯弹性体泵（P501A/B）输送至哪个装置：（    ）","answer":"C. 弹性体装置"}],"填空题":[{"q":"罐组一的混合碳五输送泵共有______台。","answer":"4"},{"q":"混合碳五储罐TK102AB储存的物料来自______部分。","answer":"混合碳五加氢"},{"q":"初聚碳五储罐TK206ABC的物料来源包括______和______。","answer":"碳五分离装置、碳五分离装置地下罐"},{"q":"苯乙烯储罐的切水通过____________排放。","answer":"切水器V403A/B、设备名称"},{"q":"丁二烯储罐的阻聚剂是______。","answer":"TBC"},{"q":"停工检修时，球罐需依次进行倒空、______、______、蒸煮等步骤。","answer":"氮气置换、排空介质"},{"q":"混合碳五储罐______总共有______个。","answer":"TK101A/B/C/D、7"},{"q":"切水器______的设计压力为______ MPa______。","answer":"52110-V101A/B/C/D、0.7、G"},{"q":"异戊二烯储罐______的容量为______ m³。","answer":"TK201A/B、4000"},{"q":"丁二烯储罐______的材质是______。","answer":"TK501A/B、Q345R"}],"判断题":[{"q":"罐组一的所有储罐均可通过P104/P106泵与罐组二的储罐倒罐。","answer":"√"},{"q":"异戊二烯储罐之间可通过异戊二烯装车泵直接倒罐。","answer":"√"},{"q":"停工检修时，球罐蒸煮的目的是去除氧气。","answer":"×"},{"q":"苯乙烯储罐的阻聚剂添加系统位于泵区。","answer":"√"},{"q":"乙腈储罐的物料来源包括汽车装卸站和碳五分离装置。","answer":"√"},{"q":"混合碳五储罐（TK205A/B）的材质是Q245R。","answer":"×"},{"q":"丁二烯储罐（TK501A/B）的操作压力为0.25 MPa(G)。","answer":"√"},{"q":"罐组五未设置地下污油储罐。","answer":"√"}],"简答题":[{"q":"简述罐组一混合碳五储罐的工艺流程（至少列出3个物料来源和去向）。","answer":"工艺流程： 来源：广东石化、厂区外码头、汽车装卸站、碳五分离装置、罐组二污油。 去向：碳五分离装置、汽车装卸站外卖、抽余油加氢部分、其他储罐倒罐。"},{"q":"倒罐操作的安全注意事项包括哪些？","answer":"倒罐注意事项： o\t获得生产中心批准； o\t佩戴劳保用品，内操监控液位； o\t打通流程后启动泵，达到计划量停泵； o\t记录最终倒料量并上报。"},{"q":"简述罐组Ⅰ中混合碳五储罐的物料来源及输送路径。","answer":"物料来源及路径： 来源：广东石化、厂区外码头、汽车装卸站的裂解碳五，以及罐组二的污油。 路径：储存后通过混合碳五泵（P101A/B）输送至碳五分离装置，或通过P102、P103A/B等泵输送至汽车装卸站或其他装置。"},{"q":"说明罐组Ⅳ中苯乙烯储罐的工艺流程及附属设备功能。","answer":"苯乙烯储罐流程及设备功能： 流程：苯乙烯来自汽车装卸站和弹性体装置的不合格物料，储存在TK403A/B中，通过苯乙烯泵（P403A/B）输送至弹性体装置。 附属设备：罐底切水器（V403A/B）用于分离水分，切出的水接入污水管线。"}]},"锅炉":{"选择题":[{"q":"锅炉的用途是（    ）","answer":"B. 焚烧化工废液及废气并产生蒸汽"},{"q":"锅炉的型式是（    ）","answer":"B. 单汽包、自然循环"},{"q":"锅炉的布置形式为（    ）","answer":"C. 半露天布置"},{"q":"锅炉型号GG - 80/4 - Y + Q中，\"80\"表示（    ）","answer":"B. 额定蒸发量80t/h"},{"q":"锅炉设计工况下，额定蒸汽温度为（    ）","answer":"A. 400℃"},{"q":"锅筒内正常水位在锅筒中心线（    ）","answer":"A. 下100mm处"},{"q":"为保证汽水品质合格，锅筒内装有（    ）进行汽水粗分离","answer":"B. 旋风分离器"},{"q":"炉膛四周由（    ）组成","answer":"B. 膜式水冷壁"},{"q":"SCR脱硝装置位于（    ）之间","answer":"B. 上级省煤器和下级省煤器"},{"q":"锅炉采用的密封结构是（    ）","answer":"B. 全密封式"},{"q":"锅炉保温材料外层护板由（    ）包覆","answer":"C. 压型钢板"},{"q":"烟气流经低温省煤器后，由（    ）引出至烟囱","answer":"A. 引风机"},{"q":"锅炉的水循环方式是（    ）","answer":"C. 集中供水、分散引入、引出"},{"q":"高温过热器、低温过热器烟气与工质流向为（    ）","answer":"B. 顺流"}],"填空题":[{"q":"锅炉设计工况燃料为______，校核工况当无轻柴油组分燃料时，______作为补充燃料。","answer":"废液和废气、天然气"},{"q":"锅炉额定蒸汽压力为______MPaG，额定蒸发量为______t/h。","answer":"4、80"},{"q":"低温过热器受热面由Φ38×4mm的光管管子顺列布置，双管圈，横向排数______排，纵向排数______排。","answer":"51、12"},{"q":"上级省煤器采用Φ32×4mm的螺旋翅片管结构，单管圈错列布置，横向排数______排，纵向排数______排。","answer":"27.5、12"},{"q":"SCR脱硝装置共设有______层催化剂装置。","answer":"两"},{"q":"锅炉本体钢架截面为______，上下由横梁相连，组成整体构架。","answer":"焊接箱型"},{"q":"锅炉给水送至省煤器前的温度为______℃。","answer":"104"},{"q":"汽水混合物经炉膛水冷壁与水冷包墙的上部出口集箱通过汽水引出管引入锅筒进行汽水分离，被分离出来的水重新进入锅筒水空间进行再循环，被分离出来的蒸汽进入______区。","answer":"过热器"},{"q":"汽包水位高Ⅱ值为______mm，此时应______。","answer":"75、开紧急放水门"},{"q":"锅筒安全阀整定压力为______MPa，过热器安全阀整定压力为______MPa。","answer":"4.664、4.16"},{"q":"煮炉的目的是清除在制造、安装过程中留在锅筒、集箱、管子内部等处的______、油脂、污垢等。","answer":"铁锈"}],"判断题":[{"q":"高温过热器布置在辐射冷却室低温过热器下方。","answer":"×"},{"q":"下级省煤器位于转向室尾部烟道下方。","answer":"×"},{"q":"锅炉采用全悬吊、全密封式结构，密封性能好。","answer":"√"},{"q":"锅炉的烟风系统流程中，废气从锅炉底部进入炉膛燃烧。","answer":"×"},{"q":"汽水流程中，给水先进入锅筒，再流经省煤器。","answer":"×"},{"q":"高温过热器、低温过热器烟气与工质流向为逆流。","answer":"×"},{"q":"烘炉分低温烘炉和高温烘炉两个阶段，低温烘炉采用微正压燃烧方法。","answer":"√"},{"q":"煮炉时，为防止水进入过热器，应保持较低的水位。","answer":"×"},{"q":"锅炉正常运行时，锅内水位应保持在正常水位±50mm范围内，并有轻微晃动。","answer":"√"},{"q":"安全阀调整或校验完毕后应加锁或铅封。","answer":"√"},{"q":"锅炉运行五至六个月以后，应停炉检修。","answer":"√"},{"q":"锅炉电控系统应与燃烧炉控制系统连锁，超压时切断燃烧系统或关闭锅炉烟气进口阀门。","answer":"√"}],"简答题":[{"q":"简述本锅炉的结构特点。","answer":"本锅炉为单汽包、自然循环废液、废气焚烧锅炉，室外半露天布置。采用全悬吊、全密封式结构。炉膛四周由膜式水冷壁组成，部分区域焊有销钉以保证燃烧室温度。第一级冷却室为辐射冷却室，内依次布置低温过热器、高温过热器。烟气依次经过转向室包墙管、高温省煤器、SCR脱硝装置、低温省煤器。锅筒采用支撑结构，通过活动支座搁置在钢架梁上，内部装有完善的汽水分离装置。锅炉架构采用全钢架全焊接结构，沿炉膛及炉体上部四周设置刚性梁，加强水冷壁和包墙管的刚性，保证炉墙密封性。"},{"q":"请描述锅炉的汽水流程。","answer":"锅炉的水循环采用集中供水、分散引入、引出的方式。104℃的锅炉给水先送至省煤器，流经省煤器后进入锅筒。锅筒中的饱和水沿下降管和下水连接管进入炉膛水冷壁下集箱与水冷包墙下集箱，在向上流经炉膛水冷壁与水冷包墙的过程中被加热成为汽水混合物，经各自的上部出口集箱通过汽水引出管引入锅筒进行汽水分离。被分离出来的水重新进入锅筒水空间，并进行再循环，被分离出来的蒸汽进入过热器区，过热器出口蒸汽经喷水减温后产生4MPaG，400℃的过热蒸汽送入界区。低温过热器与高温过热器之间设置过热器减温器调节汽温，高温过热器、低温过热器烟气与工质流向为顺流、省煤器烟气流向与工质流向为顺流。"},{"q":"简述锅炉煮炉的步骤及注意事项。","answer":"煮炉步骤： （1）将药液注入锅水使其成为浓度适当的碱水，并使之保持适当水位（保持锅筒内最高水位），通知化学分析人员化验炉水磷酸根及总碱度值。 （2）关闭汽包放气阀，加热升温升压，当锅炉压力升至0.1MPaG时，冲洗水位计，缓慢升至0.2MPaG，对所有管道、阀门作全面检查。 （3）压力升到0.3 - 0.4MPaG时，紧闭所有阀门。在1.0 - 1.5MPaG压力下煮炉12小时，期间将蒸汽排空，监视锅水水位，化验炉水，必要时补加药剂和排污。 （4）使压力升至3MPaG，控制水位，保持压力8 - 12小时，期间定时取样分析，当磷酸根连续三次取样无变化后，开启排污阀换水，直至炉水碱度达到规定范围，结束煮炉并记录。 注意事项： （1）煮炉期从锅筒、各部受热面下集箱等处取样，分析监测锅水碱度及磷酸根变化。 （2）按规定时间取样，排污时严密监视水位，控制排污时间和方式。 （3）制作并参照煮炉汽压温升曲线，做好记录。 （4）煮炉后检查锅筒、集箱、管子内壁，判断煮炉是否合格。 （5）保持取样管路阀门开启，防止堵塞。 （6）运行人员及化验人员严格按操作规程操作并记录。 （7）药品搬运及配制由化学监督人员监护，防止伤人或配错药。 （8）煮炉时部分热工仪表不使用。 （9）煮炉现场具备安全条件，有充足照明、冲洗水源、急救药品和劳保用品。"}]},"空压站":{"选择题":[{"q":"空压系统中，螺杆式空气压缩机的数量及运行模式是（    ）","answer":"B. 3套，两开一备"},{"q":"微热再生吸附式干燥器采用的吸附剂是（    ）","answer":"C. 活性氧化铝"},{"q":"仪表空气增压机的流量是（    ）","answer":"C. 2.67Nm³/min"},{"q":"螺杆式压缩机工作时，气体被压缩的过程是（    ）","answer":"B. 工作室关闭及缩小，气体被压缩"},{"q":"微热再生吸附式干燥器再生时，加热的干燥空气比例约为（    ）","answer":"A. 5%"},{"q":"空气增压装置中，驱动室B活塞左移时，哪个增压室增压（    ）","answer":"B. 增压室B"},{"q":"来自大气的空气进入空气压缩机前，首先经过（    ）","answer":"B. 过滤器"},{"q":"压缩后的空气进入储气罐后，一部分作为工厂空气，另一部分经（    ）进行除油、干燥及除尘","answer":"A. 微热再生吸附式干燥机"},{"q":"仪表风的露点控制指标是（    ）","answer":"A. ≤-40℃"},{"q":"工厂风的压力控制范围是（    ）","answer":"B. 0.60～0.80MPaG"},{"q":"空压机出口压力控制方式是（    ）","answer":"B. 通过调整操作界面设定加卸载压力"},{"q":"当空压机排气温度高时，可能的原因不包括（    ）","answer":"B. 冷却水温度低"},{"q":"微热再生干燥机出口露点高的原因可能是（    ）","answer":"C. 加热时间不够"},{"q":"空压系统开工时，启动微热再生干燥器前需要确认（    ）","answer":"B. 空压机运行正常，压力0.8-0.85MPa"},{"q":"空压系统停工时，高压仪表风停用需要关闭（    ）","answer":"D. 以上都是"},{"q":"以下哪个设备不属于空压系统的组成部分？（    ）","answer":"C. 高压水泵"},{"q":"工厂风的压力控制范围是？（    ）","answer":"B. 0.60～0.80 MPaG"},{"q":"微热再生干燥器再生时，加热器温度约为？（    ）","answer":"C. 150℃"}],"填空题":[{"q":"空压系统中，压缩空气缓冲罐的容积是______m³。","answer":"15.7"},{"q":"微热再生吸附式干燥器采用的是______吸附原理。","answer":"变温变压"},{"q":"仪表风的露点温度控制指标为______℃。","answer":"≤-40"},{"q":"空压系统中，高压仪表空气储罐和低压仪表空气储罐的容量均为______m³。","answer":"80"},{"q":"仪表空气经低压仪表空气储罐送入仪表空气总管，另抽取一小股压缩空气经______进入仪表空气增压机。","answer":"精密过滤器"},{"q":"仪表风的压力控制范围是______MPaG。","answer":"0.50～0.80"},{"q":"空压机排气压力低于正常值，可能是空气消耗量高于压缩机排气量、空气过滤器堵塞或______。","answer":"空气泄漏"},{"q":"微热再生干燥机出口露点控制方式是通过调整操作界面设定吸附及脱附时间、脱附加热温度及______。","answer":"脱附加热时长"},{"q":"空压系统开工时，送风操作包括送工业风、送仪表风以及______备用。","answer":"高压仪表风"},{"q":"空压系统主要由______、______、______、______、______、______等组成。","answer":"空气压缩机、微热再生吸附式干燥器、仪表空气增压机、压缩空气缓冲罐、高压仪表空气储罐、低压仪表空气储罐"},{"q":"空压机C-601A/B/C的进口流量是______m³/h。","answer":"24.8"},{"q":"空压系统中，设置一个高压仪表空气储罐和一个低压仪表空气储罐，其贮存容量满足全厂装置______分钟正常用气的需要。","answer":"15"}],"判断题":[{"q":"空压系统中，微热再生吸附式干燥器是3套，一开两备。","answer":"×"},{"q":"螺杆式压缩机与活塞式压缩机的工作原理完全相同。","answer":"×"},{"q":"微热再生干燥器再生时，利用蓄于吸附塔上部的热量可节约加热器功率。","answer":"√"},{"q":"空气增压装置中，驱动室A和B的活塞运动方向始终相同。","answer":"×"},{"q":"压缩后的空气全部作为工厂空气使用。","answer":"×"},{"q":"仪表风的露点越低越好，没有上限要求。","answer":"×"},{"q":"当空压机排气压力低于正常值时，只能更换滤芯解决。","answer":"×"},{"q":"微热再生干燥机出口露点高时，应缩短吸附时间。","answer":"√"},{"q":"空压系统开工时，启动微热再生干燥器前不需要确认装置无外送仪表气。","answer":"×"},{"q":"空压系统停工时，高压仪表风停用后，仪表风高压储罐不需要泄压。","answer":"×"},{"q":"空压机的作用是将大气空气过滤压缩后送至冷干机，并保证供气稳定。","answer":"√"},{"q":"空压机进口温度是固定值。","answer":"×"},{"q":"空压机C-601A/B/C的出口压力是0.9-1.0MPa。","answer":"×"},{"q":"冷干机只能脱除压缩空气中的水分，不能进行汽水分离。","answer":"×"},{"q":"冷干机开机时，循环水系统投用不需要确认水系统无泄漏。","answer":"×"},{"q":"微热再生吸附式干燥器中，活性氧化铝的孔径与水分子直径相差很大。","answer":"×"},{"q":"空压系统中，工厂风和仪表风使用同一管网供气。","answer":"×"},{"q":"空压机停机后，不需要对设备进行任何处理。","answer":"×"},{"q":"冷干机停机后，联系电气断电是必须的操作。","answer":"√"},{"q":"空压系统开工时，最终状态确认不需要检查增压机运行情况。","answer":"×"},{"q":"空压系统的储气罐容量需满足全厂装置15分钟正常用气需求。","answer":"√"},{"q":"空压系统的空气压缩机两开一备。","answer":"√"}],"简答题":[{"q":"简述螺杆式压缩机的工作原理。","answer":"螺杆式压缩机是一种按容积变化原理工作的双轴回转式压缩机。工作时，气体被吸入工作室后，工作室关闭及缩小，气体经历多变压缩过程。当工作室内气体达到预期终压力时，工作室与压出管接通，继续缩小，压缩气体被排出至排气管道。其工作室由一对斜齿齿轮转动时，齿面接触形成的接触线沿轴向运行，齿槽间输送的气体容积逐渐变小，从而实现气体压缩，与活塞式压缩机工作原理类似，但工作室组成不同。"},{"q":"简述微热再生吸附式干燥器的工作原理。","answer":"微热再生吸附式压缩空气干燥机利用多孔性固体物质表面的分子力吸取气体中的水份。采用孔径与水分子直径相近的活性氧化铝为吸附剂，基于变温变压吸附原理。常温下吸附时，空气中水分子分压力大于吸附剂中水分子分压力，水分子进入吸附剂内部并在表面冷凝成水滴，放出冷凝热蓄于吸附塔上部。再生时，约5%的干燥空气经加热器加热至150℃左右通过再生筒，降低吸附剂吸附能力，使水分子逸出，吸附塔内蓄热有助于节约加热器功率。"},{"q":"请描述压缩空气从进入空气压缩机到最终分配至用户的完整流程。","answer":"空气经过滤器进入压缩机（C-601A/B/C）压缩至0.6-0.8 MPaG→储气罐（V-604）→部分压缩空气经缓冲罐（V-602）送入工厂空气总管；剩余空气经微热再生干燥机（R-601A/B）干燥过滤→低压仪表空气储罐（V-601）→仪表空气总管。另抽取部分空气经增压机（C-602）增压后储存于高压储罐（V-603）。"},{"q":"结合工艺指标，分析为何需要分别设置高压和低压仪表空气储罐。","answer":"高压储罐（V-603）用于储存增压后的仪表空气，满足高压用户需求；低压储罐（V-601）直接供应常规仪表空气。两者容量均为80m³，可缓冲用气波动，确保全厂15分钟应急供气，同时通过分压设计优化管网效率。"}]},"污水预处理":{"选择题":[{"q":"碳五分离装置生产废水的处理水量设计规模为多少？（    ）","answer":"C. 60m³/h"},{"q":"以下哪项废水需要先经过冷却塔处理后再进入调节罐？（    ）","answer":"B. 弹性体装置生产废水"},{"q":"反渗透产水的总氮指标要求是？（    ）","answer":"B. ≤70 ppm"},{"q":"碳五废水反应池的主要预处理步骤包括：（    ）","answer":"B. 隔油和加酸中和"},{"q":"污水处理界区内的废碱液储罐主要用于暂存哪类废水？（    ）","answer":"B. 加氢装置废碱液"}],"填空题":[{"q":"加氢装置生产废水处理水量设计规模为 ______ m³/h。","answer":"3"},{"q":"反渗透产水的电导率指标要求是______ μs/cm______。","answer":"≤1500、部门级标准"},{"q":"弹性体装置生产废水进入污水处理界区后，需先经过______ 进行冷却。","answer":"废水冷却塔"},{"q":"污水处理系统中，RO浓水最终被送至 ______ 进一步处理。","answer":"厂外污水厂"},{"q":"污水收集池的作用是收集污水处理内的______、______ 和初期雨水等排水。","answer":"冲洗、放空"}],"判断题":[{"q":"碳五分离装置废水直接进入进水调节罐，无需预处理。","answer":"×"},{"q":"TO单元废水通过管廊直接进入生化出水池处理。","answer":"√"},{"q":"污水处理界区设置的酸加药装置用于弹性体装置废水处理。","answer":"×"},{"q":"反渗透产水的pH值有明确的数值指标要求。","answer":"×"},{"q":"公辅工程排污水设计规模为50~200m³/h，年操作时间为8000小时。","answer":"√"}],"简答题":[{"q":"请简述碳五分离装置生产废水的预处理流程，并说明隔油和加酸中和的作用。","answer":"碳五废水进入反应池进行隔油（分离浮油）和加酸中和（调节pH）。隔油可减少后续处理负荷，加酸中和可避免碱性物质腐蚀设备。"},{"q":"对比加氢装置与弹性体装置生产废水的预处理方式，指出两者的异同点。","answer":"相同点：均需预处理后进入调节罐混合；不同点：加氢废水可暂存于调节罐，弹性体废水需冷却后进入调节罐。"}]},"循环水站":{"选择题":[{"q":"循环水场的设计能力为（    ）","answer":"C. 20000m³/h"},{"q":"循环水场年工作小时数按（    ）计","answer":"B. 8000h"},{"q":"循环水冷却过程中，热量损失的主要方式是（    ）","answer":"C. 蒸发散热"},{"q":"从生产装置返回的热水在冷却塔中被喷淋在填料上，水的流动方向是（    ）","answer":"B. 从上而下"},{"q":"空气进入凉水塔填料层的方式是（    ）","answer":"C. 从侧面进入"},{"q":"循环水系统中，为防止生物黏泥产生，加药设备定期向（    ）投加次氯酸钠","answer":"B. 吸水池"},{"q":"循环水系统中，水质稳定药剂投加设备的投药方式是（    ）","answer":"C. 连续"},{"q":"循环水系统设置浅层砂过滤器是为了去除水中的（    ）","answer":"C. 悬浮固体"},{"q":"本项目循环水场一期设有（    ）台钢筋混凝土框架逆流式冷却塔","answer":"B. 四"},{"q":"循环水场一期单台冷却塔的处理能力是（    ）","answer":"B. 5000m³/h"},{"q":"循环水系统中，循环水泵的设计为（    ）","answer":"B. 两用一备"},{"q":"为保证冷却水质量，过滤水量为冷却水循环量的（    ）","answer":"B. 4%"},{"q":"循环水系统的旁滤器采用（    ）","answer":"C. 浅层砂过滤器"},{"q":"循环水系统中，浅层砂过滤器共设置（    ）组","answer":"B. 3"},{"q":"循环水系统的补水水源不包括（    ）","answer":"D. 消防水"},{"q":"循环水水温的控制目标是确保冷却效果，冷水温度应（    ）","answer":"A. ≤33℃"},{"q":"循环水压力的控制范围是循环水上水压力（    ）","answer":"B. ≥0.33MPa"},{"q":"当循环水系统压力偏低或偏高时，优先调节（    ）来控制压力","answer":"A. 其他装置阀门开度或系统阀门"},{"q":"循环水装置开工前，各动设备应（    ）","answer":"A. 全部单机试运完毕"},{"q":"循环水装置开工前，需确认各盲板（    ）","answer":"A. 已正确拆装，并经检验无误"}],"填空题":[{"q":"循环水的冷却主要依靠______、______和______三个散热过程。","answer":"蒸发散热、接触散热、辐射散热"},{"q":"从生产装置返回的热水被______均匀地喷淋在填料上。","answer":"布水器"},{"q":"在凉水塔的实际运行中，循环水的冷却降温主要靠部分水的蒸发冷却，这部分损失的热量占整个损失热量的______。","answer":"80 - 90％"},{"q":"当系统处于过滤状态时，未经过滤的水通过过滤器顶部的______，配合球形外壳，以接近平流的状态流经填料层。","answer":"布水器"},{"q":"循环冷却水回水利用系统余压进入冷却塔，使水温由______降至______。","answer":"43℃、33℃"},{"q":"循环水系统由冷却塔、______、______、______、控制室、加药间、旁滤器等组成。","answer":"集水池、吸水池、循环水泵"},{"q":"循环水场一期设有______台逆流式冷却塔，单台处理能力为______m³/h。二期预留一台。","answer":"四、5000"},{"q":"每座冷却塔配有直径______的轴流风机一台，其中______是变频风机。","answer":"9.7m、CWT001D"},{"q":"循环水场共设______台循环水泵，其中2台循环水泵额定流量______，扬程______；另1台循环水泵额定流量为______，扬程______。","answer":"3、7000m³/h、54m、4000m³/h、54m"},{"q":"为保证冷却水质量，部分冷却水应经过滤处理，本系统过滤水量为冷却水循环量的______。","answer":"4％"},{"q":"循环水系统采用的旁滤器为______，共设置______组，每组有______台罐，总的处理水量为______。","answer":"浅层砂过滤器、3、四、800m³/h"},{"q":"循环水场的供水水源有三处，分别是______、______和从界区生产水主管线抽头直接补水。","answer":"给水加压泵站低压生产水泵向循环水场提供低压生产水、污水处理及回用水站通过回用水管道补入循环水系统内"},{"q":"循环水水温的控制方法是调整______、上塔水量分配和开风机数量。","answer":"凉水塔运行数量"},{"q":"循环水压力控制方式中，若装置压力偏低或偏高，可调节其他装置阀门开度或系统阀门，若仍不能满足，可______或减少水泵台数。","answer":"增开"},{"q":"循环水装置开工前，应检查所有设备及仪表及流量计的完好情况，各仪表流量计应处于______状态。","answer":"良好待用"},{"q":"循环水装置开工前，各动设备送电情况应满足电已引至______，具备启动条件。","answer":"泵前"},{"q":"循环水装置开工前，原料应充足，化验室应准备工作完成，具备______条件。","answer":"取样分析"},{"q":"循环水装置开工前，应确认各盲板已正确拆装，并经______无误。","answer":"检验"},{"q":"循环水装置开工前，试压、吹扫、______合格，具备开车条件。","answer":"气密"},{"q":"循环水装置开工前，安全设施准备中，装置内的消防竖管和______配置完毕。","answer":"干粉灭火器"}],"判断题":[{"q":"循环水系统的主要作用是向全厂各生产装置提供压力、温度、流量等各项指标符合工艺要求的冷却用水。","answer":"√"},{"q":"循环水的冷却过程中，辐射散热是主要的散热方式。","answer":"×"},{"q":"浅层砂过滤器过滤时，杂质被截留在过滤器底部的收集器内。","answer":"×"},{"q":"循环冷却水回水直接进入冷却水泵，再送至用户循环使用。","answer":"×"},{"q":"循环水系统设置加药设备，主要是为了调节循环水的pH值。","answer":"×"},{"q":"本项目循环水场一期设有五台钢筋混凝土框架逆流式冷却塔。","answer":"×"},{"q":"循环水场的冷却塔单台处理能力为6000m³/h。","answer":"×"},{"q":"循环水系统的循环水泵设计为三用一备。","answer":"×"},{"q":"为保证冷却水质量，过滤水量为冷却水循环量的6%。","answer":"×"},{"q":"循环水系统的旁滤器采用活性炭过滤器。","answer":"×"},{"q":"循环水场的供水水源只有一处，即给水加压泵站低压生产水泵提供的低压生产水。","answer":"×"},{"q":"循环水水温的控制目标是确保循环水冷却效果，冷水温度应≤35℃。","answer":"×"},{"q":"循环水压力控制范围是循环水上水压力≥0.3MPa。","answer":"×"},{"q":"当循环水系统压力异常时，只能通过增开或减少水泵台数来调整。","answer":"×"},{"q":"循环水装置开工前，各动设备无需单机试运。","answer":"×"},{"q":"循环水装置开工前，只需检查设备的完好情况，无需检查仪表。","answer":"×"},{"q":"循环水装置开工前，确认各盲板已拆除即可，无需检验。","answer":"×"},{"q":"循环水装置开工前，试压、吹扫、气密合格是具备开车条件之一。","answer":"√"},{"q":"循环水装置开工前，安全设施准备中，装置及物料储存场所无需设置检测报警设施。","answer":"×"},{"q":"循环水装置开工前，员工无需配备个体防护器材。","answer":"×"}],"简答题":[{"q":"简述循环水的冷却原理。","answer":"循环水的冷却是通过水与空气接触，由蒸发散热、接触散热和辐射散热三个过程共同作用的结果。从生产装置返回的热水被布水器均匀地喷淋在填料上，形成很薄的水膜或溅散成细小的水滴，从上而下流动。在风机的作用下，空气由凉水塔侧面进入凉水塔的填料层，湿度较低且较干燥的空气与水膜或水滴交替流动，充分接触。由于能量和质量不平衡，水气两相间自动地发生传热、传质过程。一方面，因为温度差，热水与冷空气发生热传导使热水降温；另一方面，因新鲜空气湿度小未饱和，水自发蒸发进入空气，至空气饱和，水蒸发带走大量热，使水温进一步降低，达到冷却目的。在实际运行中，循环水冷却降温主要靠部分水的蒸发冷却，这部分损失热量占80 - 90％，少部分约10 - 20％的热量靠水与空气之间的导热过程传递。"},{"q":"简述浅层砂过滤器的过滤原理。","answer":"当系统处于过滤状态时，未经过滤的水通过过滤器顶部的布水器，配合球形外壳，以接近平流的状态流经填料层。当水流过填料层时，杂质被截留在填料层内，过滤器底部的收集器将过滤后的水均匀地收集并流出。随着杂质在填料层中的不断聚积，进出水压差将不断增大。当压差达到一定的设定限度或过滤时间达到设定值时，系统将自动进入反洗状态。反洗时，通过控制系统改变三通阀的通断位置（进口关闭，排污口打开），其他过滤单元中经过过滤的水部分流入要反洗的过滤单元中。由于系统内部水压，被反洗的过滤单元的填料层在水流的冲击下被冲起，杂质则通过三通排污阀的排污口被排出。"},{"q":"简述循环水系统的工艺流程。","answer":"由各生产装置和辅助生产设施返回的循环冷却水回水，利用系统余压进入冷却塔，使水温由43℃降至33℃，进入冷却塔水池，经格栅后进入吸水池，由冷却水泵送至用户循环使用。为防止系统中产生生物黏泥，设置加药设备定期向吸水池投加次氯酸钠杀灭水中的微生物；为防止工艺设备及管道腐蚀或结垢，系统设置水质稳定药剂投加设备连续向水中投加水质稳定药剂。为保证系统水中悬浮固体SS≤20NTU，系统设置浅层砂过滤器，用于去除水中悬浮固体。循环冷却水系统由冷却塔、集水池、吸水池、循环水泵、控制室、加药间、旁滤器等组成。"},{"q":"简述循环水装置开工前的工艺准备工作内容。","answer":"（1）检查所有设备及仪表及流量计的完好情况，各仪表流量计处于良好待用状态。 （2）各动设备全部单机试运完毕，检查各动设备送电情况（电已引至泵前，具备启动条件）及润滑油是否加足，手动盘车和点动试车是否灵活，转向是否正确，冷却水投用。所有泵应处于良好状态，所属设备管线、阀门情况完好，且所有阀门，均应处于关闭状态。 （3）原料充足，化验室准备工作完成，具备取样分析条件。 （4）确认各盲板已正确拆装，并经检验无误。 （5）试压、吹扫、气密合格。具备开车条件。 （6）助剂已具备使用条件。 （7）准备好记录表格。"}]},"制氮站":{"选择题":[{"q":"PSA制氮装置中，设计粗氮产量为（    ）","answer":"B. ≥1100Nm³/h"},{"q":"空压机C101的产气量为（    ）","answer":"B. 44.2m³/h"},{"q":"变压吸附利用的吸附剂是（    ）","answer":"C. 碳分子筛"},{"q":"碳分子筛吸附分离空气时，先被吸附在其表面的是（    ）","answer":"B. 氧气分子"},{"q":"压缩空气经冷干机组后，露点降到（    ）","answer":"B. 5~ -5℃"},{"q":"吸附撬块出口氧含量控制指标为（    ）","answer":"C. ≤1000ppm"},{"q":"粗氮含量要求为（    ）","answer":"B. ≥99.9%"},{"q":"空压机出口压力控制范围是（    ））","answer":"B. 0.90 - 1.00MPa(G"},{"q":"空压机排气温度控制指标为（    ）","answer":"B. ≤105℃"},{"q":"冷干机露点温度控制范围是（    ）","answer":"A. 5~ -5℃"},{"q":"液氮罐压力控制指标为（    ））","answer":"B. ≤0.85MPa(G"},{"q":"液氮罐液位控制范围是（    ）","answer":"B. 2000 - 9000mm"},{"q":"循环水给水温度控制指标为（    ）","answer":"B. ≤33℃"},{"q":"循环水给水压力控制范围是（    ））","answer":"B. 0.35 - 0.40MPa(G"},{"q":"当空压机排气温度高时，可能的原因不包括（    ）","answer":"A. 冷却水压力够"},{"q":"冷干机露点偏高，可能的原因是（    ）","answer":"C. 压缩机故障"},{"q":"若发现氮气管网氧含量偏高因气动阀门故障造成，应（    ）","answer":"B. 通知仪表检查气动阀门工作状态"},{"q":"PSA制氮系统停工时，首先应进行的操作是（    ）","answer":"D. 氮气外供停用"},{"q":"氮气储槽容积为（    ）","answer":"A. 63m³"}],"填空题":[{"q":"PSA制氮装置主要由空压机、冷干机、活性炭过滤器、空气储罐、______、普氮缓冲罐、液氮储罐、空温汽化器、精氮缓冲罐组成。","answer":"吸附塔撬块"},{"q":"变压吸附的基本原理是利用吸附剂对吸附介质在不同压力下有不同的吸附容量，并且在一定压力下对被分离的气体混合物各组分有______的特性。","answer":"选择吸附"},{"q":"压缩空气经螺杆式空气压缩机压缩后，排气压力为 ______ MPa______。","answer":"0.80 - 1.0、G"},{"q":"吸附塔撬块分为两个吸附塔，当一个塔在吸附工作时，另一个塔进行______工作。","answer":"脱附"},{"q":"粗氮缓冲罐中，当检测氧含量低于设定值 ______ ppm时，供往氢气纯化撬块。","answer":"1000"},{"q":"空压机出口压力控制范围是 ______ MPa______。","answer":"0.83 - 0.88、G"},{"q":"冷干机通过控制 ______ 来控制压缩气体露点温度。","answer":"冷干机负荷"},{"q":"PSA制氮装置中，设计粗氮产量为______Nm³/h。","answer":"≥1100 "},{"q":"冷干机的露点温度控制指标为______。","answer":"5℃～-5℃"},{"q":"普氮缓冲罐的氮气纯度要求为 ______。","answer":"≥99.9%"},{"q":"变压吸附工艺中，吸附剂再生是通过 ______ 实现的。","answer":"减压脱附"}],"判断题":[{"q":"PSA制氮装置中的两台空压机一开一备。","answer":"√"},{"q":"碳分子筛的孔直径不在氮气和氧气分子直径范围内。","answer":"×"},{"q":"压缩空气经过活性炭过滤器后进入冷干机组。","answer":"×"},{"q":"吸附塔在吸附和脱附过程中，压力是不变的。","answer":"×"},{"q":"粗氮缓冲罐中的氮气纯度一定能达到99.99%。","answer":"×"},{"q":"空压机C101出口压力控制范围是0.83 - 0.88MPa（G）。","answer":"×"},{"q":"冷干机露点温度控制范围是5~ -5℃，越低越好。","answer":"×"},{"q":"液氮罐液位越高越好，没有上限要求。","answer":"×"},{"q":"循环水给水温度越高，对系统运行越有利。","answer":"×"},{"q":"当空压机排气温度高时，只能停机等待检修。","answer":"×"},{"q":"冷干机露点偏高时，可能是进气温度高导致的。","answer":"√"},{"q":"变压吸附（PSA）通过温度变化实现气体分离。","answer":"×"},{"q":"吸附塔撬块由三个吸附塔组成。","answer":"×"},{"q":"液氮站的主要作用是为制氮系统故障时提供备用氮气。","answer":"√"},{"q":"循环水系统的给水压力控制范围为0.35-0.40 MPa(G)。","answer":"√"}],"简答题":[{"q":"简述PSA制氮的工艺流程。","answer":"环境空气经空压机压缩至0.80-1.0 MPa(G)，经冷干机降温至露点5℃～-5℃，再通过活性炭过滤器净化；干燥空气进入吸附塔撬块，两塔交替工作：一塔吸附氧气（产出粗氮），另一塔减压脱附再生；粗氮进入缓冲罐，氧含量低于1000 ppm时输送至后续纯化系统；液氮储罐通过空温汽化器提供备用氮气，确保系统连续运行。"},{"q":"说明碳分子筛（CMS）的工作原理及其在制氮中的作用。","answer":"碳分子筛的孔径接近氧气和氮气分子直径，优先吸附更小、更轻的氧气分子。高压下氧气被吸附在CMS表面，氮气作为产品气排出；减压时氧气脱附，吸附剂再生。通过压力交替变化实现连续分离，最终得到纯度≥99.9%的氮气。"},{"q":"当空压机排气压力低于正常值时，应如何进行检查和处理？","answer":"当空压机排气压力低于正常值时，应进行以下检查和处理：（1）、检查相关用气量，看是否空气消耗量高于压缩机排气量，若存在这种情况，需调整用气量或增加压缩机排气量；（2）检查空气过滤器是否堵塞，若堵塞则更换滤芯；（3）检查是否存在空气泄漏情况，仔细查找漏点，并进行排除。"},{"q":"分析液氮站在PSA制氮系统中的重要性。","answer":"液氮站作为备用系统，在PSA装置故障或停工时可提供连续氮气供应，避免关联装置停摆。液氮储罐（100m³）通过汽化器转化为气态氮，保障紧急工况下的氮气需求。包含安全泄压装置，确保系统压力稳定和操作安全。"}]},"制冷站":{"选择题":[{"q":"低温水系统不向以下哪个装置供水？（    ）","answer":"B. 罐组二"},{"q":"冷冻水系统负责向多个区域供水，其中不包括（    ）","answer":"A. 罐组三"},{"q":"低温水系统设置的水罐容积是（    ）","answer":"B. 460m³"},{"q":"冷冻水系统设置的水罐容积与低温水系统相比（    ）","answer":"C. 相同"},{"q":"低温水系统的供水温度为（    ）","answer":"B. 5 - 10℃"},{"q":"低温水系统的正常生产机组运行模式为（    ）","answer":"B. 三用一备"},{"q":"冷冻水中乙二醇的含量是（    ）","answer":"C. 35%"},{"q":"冷冻水经过冷冻机组制冷后，形成的供应装置生产的温度范围是（    ）","answer":"B. -5 - -10℃"},{"q":"冷冻机组正常生产时的运行模式是（    ）","answer":"B. 一用一备"},{"q":"低温/冷冻机将制冷剂压缩成液态后，在哪个设备中与低温水/冷冻水进行热交换？（    ）","answer":"B. 蒸发器"},{"q":"经蒸发后的制冷剂在冷凝器中与（    ）进行热交换","answer":"C. 冷却循环水"},{"q":"冷却循环水在散热水塔上进行喷淋冷却，是与（    ）进行热交换","answer":"A. 空气"},{"q":"螺杆制冷压缩机的工作原理属于（    ）","answer":"C. 回转容积型压缩机"},{"q":"制冷系统的冷却水由全厂循环水场统一制备的温度范围是（    ）","answer":"B. 33℃/43℃"},{"q":"被压缩后的气体冷媒在冷凝器中发生的变化是（    ）","answer":"A. 等压冷却冷凝变成液态"},{"q":"低温水自低温水罐通过什么设备打入低温水机组？（    ）","answer":"A. 低温水循环泵"},{"q":"冷冻水由外管网回水总管回到制冷站外的哪个设备？（    ））","answer":"C. 缓冲罐（带氮封隔绝空气"}],"填空题":[{"q":"低温水系统负责向碳五分离装置、弹性体装置、混合碳五加氢装置以及______供水。","answer":"后处理厂房装置"},{"q":"冷冻水系统负责向碳五分离装置、罐组二、罐组四、罐组五、弹性体装置、后处理厂房和______供水。","answer":"引发剂单元"},{"q":"低温水与冷冻水系统分别设置一座______m³水罐。","answer":"460"},{"q":"低温水经过低温水机组制冷，形成______低温水供水至装置。","answer":"5 - 10℃"},{"q":"低温机组有四台，正常生产时______。","answer":"三用一备"},{"q":"冷冻水系统中，乙二醇的浓度控制指标为______。","answer":"35%"},{"q":"冷冻水经过冷冻机组制冷后，形成______的冷冻水供应装置生产。","answer":"-5 ~ -10℃"},{"q":"冷冻机组有二台，正常生产时______。","answer":"一用一备"},{"q":"低温/冷冻机通过压缩机将制冷剂压缩成液态后送蒸发器中与______进行热交换。","answer":"低温水/冷冻水"},{"q":"经蒸发后的制冷剂在冷凝器中与______进行热交换。","answer":"冷却循环水"},{"q":"螺杆制冷压缩机体内有______字形的内腔。","answer":"8"},{"q":"低温水自低温水罐通过______打入低温水机组。","answer":"低温水循环泵"},{"q":"冷冻水由外管网回水总管回到制冷站外____________。","answer":"缓冲罐、带氮封隔绝空气"},{"q":"低温水系统的补水采用______，冷冻水系统的补水采用______。","answer":"脱盐水、35%乙二醇溶液"},{"q":"冷冻水采用现场配制的______乙二醇溶液。","answer":"35%"},{"q":"制冷系统的冷却水均采用全厂循环水场统一制备的______冷却水。","answer":"33℃/43℃"}],"判断题":[{"q":"低温水系统和冷冻水系统供水装置完全相同。","answer":"×"},{"q":"低温水系统和冷冻水系统设置的水罐容积不同。","answer":"×"},{"q":"低温水经过低温水机组制冷后形成的供水温度范围是3 - 8℃。","answer":"×"},{"q":"低温机组正常生产时是二用二备。","answer":"×"},{"q":"冷冻水中乙二醇含量为30%。","answer":"×"},{"q":"冷冻水经过冷冻机组制冷后形成 -3 ~ -8℃的冷冻水供应装置生产。","answer":"×"},{"q":"冷冻机组正常生产时是一用一备。","answer":"√"},{"q":"低温/冷冻机通过压缩机将制冷剂压缩成气态后送蒸发器中与低温水/冷冻水进行热交换。","answer":"×"},{"q":"经蒸发后的制冷剂在冷凝器中与低温水进行热交换。","answer":"×"},{"q":"螺杆制冷压缩机体内有圆形的内腔。","answer":"×"},{"q":"制冷系统的冷却水均采用全厂循环水场统一制备的30℃/40℃冷却水。","answer":"×"},{"q":"低温水采用工业水补水。","answer":"×"},{"q":"低温水自低温水罐通过冷冻水循环泵打入低温水机组。","answer":"×"},{"q":"被压缩后的气体冷媒在冷凝器中等压冷却冷凝变成液态冷媒。","answer":"√"},{"q":"液态冷媒经节流阀膨胀后变成气态冷媒。","answer":"×"},{"q":"冷冻水由外管网回水总管回到制冷站外冷冻水罐（带氮封隔绝空气）。","answer":"×"},{"q":"冷冻水采用现场配制的35%乙二醇溶液，由专用接管分别将脱盐水和乙二醇送至缓冲罐。","answer":"√"}],"简答题":[{"q":"请简述低温/冷冻水系统的工作原理。","answer":"低温/冷冻水系统工作原理：低温/冷冻机通过压缩机将制冷剂压缩成液态后送蒸发器中与低温水/冷冻水进行热交换，将低温水/冷冻水制冷，低温水/冷冻水泵将低温水/冷冻水送到各装置使用。经蒸发后的制冷剂在冷凝器中释放出热量，与冷却循环水进行热交换，由冷却水泵将带有热量的冷却水送到散热水塔上由水塔风扇对其进行喷淋冷却，与大气之间进行热交换，将热量散发到大气中去。"},{"q":"简述螺杆制冷压缩机的工作原理。","answer":"螺杆制冷压缩机是回转容积型压缩机。它和活塞制冷压缩机相似，靠气体进入机器后体积的缩小，使单位体积中气体分子密度急剧增加而使气体状态制冷剂的压力升高。在螺杆制冷压缩机体内有8字形的内腔，其中装有两只互相啮合的转子（阳转子与阴转子）。当二转子转动时，因二转子的齿部相互插入到对方的齿槽内，随着转子的旋转，插入的长度越来越大，使容纳气体槽的容积越来越小，从而达到压缩气体制冷剂的目的。"},{"q":"解释制冷系统中冷却循环水的作用，并说明其循环路径。","answer":"冷却循环水作用： 吸收冷凝器中制冷剂释放的热量。 路径： 循环水场→制冷站冷凝器→凉水塔喷淋冷却→返回循环水场。"}]}};
var SECTIONS=["地面火炬", "给水加压泵站", "罐区", "锅炉", "空压站", "污水预处理", "循环水站", "制氮站", "制冷站"];

var SUBTYPES=["选择题","填空题","判断题","简答题"];
var SUB_LABELS={"选择题":"选择题","填空题":"填空题","判断题":"判断题","简答题":"简答题"};
var state={mode:"browse",section:null,subtype:null,search:"",exam:null};
var all=[];
for(var s in DATA){for(var t in DATA[s]){DATA[s][t].forEach(function(q,i){all.push({section:s,subtype:t,index:i+1,q:q.q,answer:q.answer});});}}
function filter(){var qs=all;if(state.section)qs=qs.filter(function(q){return q.section===state.section});if(state.subtype)qs=qs.filter(function(q){return q.subtype===state.subtype});if(state.search){var kw=state.search.toLowerCase();qs=qs.filter(function(q){return q.q.toLowerCase().indexOf(kw)>-1||q.answer.toLowerCase().indexOf(kw)>-1})}return qs}
function render(){var qs=filter();document.getElementById("info").textContent=qs.length+" 题";var el=document.getElementById("list");if(!qs.length){el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><div>没有匹配的题目</div></div>';return}var isBrowse=state.mode==="browse";var html="";qs.forEach(function(q,i){var ahtml="";var qd=q.q;if(q.subtype==="选择题"){if(isBrowse)ahtml='<div class="card-a visible"><span class="label">答案</span>'+q.answer+'</div>';else ahtml='<div class="card-a"></div><button class="reveal-btn" data-q="'+i+'">显示答案</button>'}else if(q.subtype==="判断题"){if(isBrowse)ahtml='<div class="card-a visible"><span class="label">答案</span>'+q.answer+'</div>';else ahtml='<div class="tf-btns"><button class="tf-btn" data-q="'+i+'" data-val="√">✓</button><button class="tf-btn" data-q="'+i+'" data-val="×">✗</button></div><div class="card-a"></div>'}else if(q.subtype==="填空题"){qd=q.q.replace(/______/g,'<span style="display:inline-block;min-width:40px;border-bottom:2px solid var(--primary);margin:0 4px;text-align:center">___</span>');if(isBrowse)ahtml='<div class="card-a visible"><span class="label">答案</span>'+q.answer+'</div>';else ahtml='<div class="card-a"></div><button class="reveal-btn" data-q="'+i+'">显示答案</button>'}else{if(isBrowse)ahtml='<div class="card-a visible"><span class="label">答案</span>'+q.answer+'</div>';else ahtml='<div class="card-a"></div><button class="reveal-btn" data-q="'+i+'">显示答案</button>'}var sl=SUB_LABELS[q.subtype]||q.subtype;html+='<div class="card"><div class="card-head"><span class="card-tag">'+q.section+' · '+sl+'</span><span class="card-num">#'+q.index+'</span></div><div class="card-body"><div class="card-q">'+qd+'</div>'+ahtml+'</div></div>'});el.innerHTML=html;if(state.mode==="practice"){el.querySelectorAll(".tf-btn").forEach(function(b){b.addEventListener("click",function(){if(this.parentElement.querySelector(".correct,.wrong"))return;var qi=parseInt(this.dataset.q);var q=qs[qi];if(this.dataset.val===q.answer)this.classList.add("correct");else{this.classList.add("wrong");this.parentElement.querySelector('[data-val="'+q.answer+'"]').classList.add("correct")}this.parentElement.querySelectorAll(".tf-btn").forEach(function(x){x.style.pointerEvents="none"});var c=this.closest(".card");var a=c.querySelector(".card-a");if(a){a.innerHTML='<span class="label">答案</span>'+q.answer;a.classList.add("visible")}})});el.querySelectorAll(".reveal-btn").forEach(function(b){b.addEventListener("click",function(){var qi=parseInt(this.dataset.q);var q=qs[qi];var c=this.closest(".card");var a=c.querySelector(".card-a");if(a){a.innerHTML='<span class="label">答案</span>'+q.answer;a.classList.add("visible")}this.remove()})})}}
function initTabs(){var st=document.getElementById("secTabs");var sb=document.getElementById("subTabs");st.innerHTML='<button class="active" data-sec="">全部</button>'+SECTIONS.map(function(s){return'<button data-sec="'+s+'">'+s+'</button>'}).join("");sb.innerHTML='<button class="active" data-sub="">全部</button>'+SUBTYPES.map(function(s){return'<button data-sub="'+s+'">'+SUB_LABELS[s]+'</button>'}).join("");st.querySelectorAll("button").forEach(function(b){b.addEventListener("click",function(){st.querySelectorAll("button").forEach(function(x){x.classList.remove("active")});this.classList.add("active");state.section=this.dataset.sec||null;render();this.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"})})});sb.querySelectorAll("button").forEach(function(b){b.addEventListener("click",function(){sb.querySelectorAll("button").forEach(function(x){x.classList.remove("active")});this.classList.add("active");state.subtype=this.dataset.sub||null;render()})})}
document.getElementById("btnBrowse").addEventListener("click",function(){state.mode="browse";document.getElementById("btnBrowse").classList.add("active");document.getElementById("btnPractice").classList.remove("active");render()});
document.getElementById("btnPractice").addEventListener("click",function(){state.mode="practice";document.getElementById("btnPractice").classList.add("active");document.getElementById("btnBrowse").classList.remove("active");render()});
document.getElementById("search").addEventListener("input",function(){state.search=this.value.trim();render()});
var examTimer=null;
document.getElementById("btnExam").addEventListener("click",function(){var qs=filter();if(!qs.length){alert("当前筛选条件下没有题目");return}var n=Math.min(20,qs.length);var sel=[].concat(qs).sort(function(){return Math.random()-.5}).slice(0,n);startExam(sel)});
function startExam(qs){state.exam={questions:qs,answers:new Array(qs.length).fill(null),startTime:Date.now(),duration:30*60,current:0};document.getElementById("exam-overlay").classList.add("active");document.body.style.overflow="hidden";renderExam();startTimer()}
function startTimer(){clearInterval(examTimer);var te=document.getElementById("examTimer");examTimer=setInterval(function(){var e=Math.floor((Date.now()-state.exam.startTime)/1000);var r=Math.max(0,state.exam.duration-e);var m=Math.floor(r/60);var s=r%60;te.textContent=m+":"+(s<10?"0":"")+s;if(r<300)te.classList.add("warning");else te.classList.remove("warning");if(r<=0)submitExam()},1000)}
function renderExam(){var ex=state.exam;if(!ex)return;document.getElementById("examProgress").textContent=(ex.current+1)+"/"+ex.questions.length;var q=ex.questions[ex.current];var a=ex.answers[ex.current];var ah="";if(q.subtype==="选择题"){ah='<div style="margin-top:10px"><textarea style="width:100%;min-height:60px;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;resize:vertical;font-family:inherit" placeholder="输入你的答案..." oninput="examAnswerText(this.value)">'+(a||"")+'</textarea></div>'}else if(q.subtype==="判断题"){ah='<div class="tf-btns"><button class="tf-btn'+(a==='√'?' selected':'')+'" onclick="examAnswer(\'√\')">✓</button><button class="tf-btn'+(a==='×'?' selected':'')+'" onclick="examAnswer(\'×\')">✗</button></div>'}else{ah='<div style="margin-top:10px"><textarea style="width:100%;min-height:80px;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;resize:vertical;font-family:inherit" placeholder="输入你的答案..." oninput="examAnswerText(this.value)">'+(a||"")+'</textarea></div>'}document.getElementById("examBody").innerHTML='<div class="exam-card"><div class="exam-q-num">'+q.section+' · '+q.subtype+' #'+q.index+'</div><div class="exam-q-text">'+q.q+'</div>'+ah+'</div>';document.getElementById("exam-overlay").scrollTop=0}
function examAnswer(v){if(!state.exam)return;state.exam.answers[state.exam.current]=v;renderExam()}
function examAnswerText(v){if(!state.exam)return;state.exam.answers[state.exam.current]=v}
function examPrev(){if(!state.exam)return;if(state.exam.current>0){state.exam.current--;renderExam()}}
function examNext(){if(!state.exam)return;if(state.exam.current<state.exam.questions.length-1){state.exam.current++;renderExam()}}
function submitExam(){clearInterval(examTimer);var ex=state.exam;if(!ex)return;var c=0;ex.questions.forEach(function(q,i){var ua=ex.answers[i];var ok=false;if(q.subtype==="选择题")ok=ua&&(q.answer.indexOf(ua.trim())>-1||ua.trim().indexOf(q.answer)>-1);else if(q.subtype==="判断题")ok=ua===q.answer;else if(ua&&ua.trim())ok=q.answer.indexOf(ua.trim())>-1||ua.trim().indexOf(q.answer)>-1;if(ok)c++});var sc=Math.round((c/ex.questions.length)*100);document.getElementById("scoreNum").textContent=sc+"%";document.getElementById("scoreDetail").textContent="正确 "+c+"/"+ex.questions.length+" 题";document.getElementById("scoreOverlay").classList.add("active")}
function closeScore(){document.getElementById("scoreOverlay").classList.remove("active");closeExam()}
function viewAnswers(){document.getElementById("scoreOverlay").classList.remove("active");var ex=state.exam;if(!ex)return;var h="";ex.questions.forEach(function(q,i){var ua=ex.answers[i]||"未作答";var ok=false;if(q.subtype==="选择题")ok=ua&&(q.answer.indexOf(ua.trim())>-1||ua.trim().indexOf(q.answer)>-1);else if(q.subtype==="判断题")ok=ua===q.answer;else ok=ua&&(q.answer.indexOf(ua.trim())>-1||ua.trim().indexOf(q.answer)>-1);h+='<div class="exam-card"><div class="exam-q-num" style="color:'+(ok?'var(--success)':'var(--error)')+'">'+q.section+' · '+q.subtype+' #'+q.index+' '+(ok?'✓':'✗')+'</div><div class="exam-q-text">'+q.q+'</div><div style="font-size:13px;color:var(--text2);margin-bottom:4px">你的答案: '+ua+'</div><div style="font-size:13px;color:var(--success)">正确答案: '+q.answer+'</div></div>'});document.getElementById("examBody").innerHTML=h;document.getElementById("examFoot").innerHTML='<button class="btn-submit" onclick="closeExam()">返回</button>';document.getElementById("exam-overlay").scrollTop=0}
function closeExam(){clearInterval(examTimer);document.getElementById("exam-overlay").classList.remove("active");document.getElementById("scoreOverlay").classList.remove("active");document.body.style.overflow="";state.exam=null;document.getElementById("examFoot").innerHTML='<button class="btn-cancel" onclick="closeExam()">退出</button><button class="btn-submit" onclick="submitExam()">交卷</button>';render()}
initTabs();render();
document.getElementById("updateOverlay").classList.add("active");
function closeUpdate(){document.getElementById("updateOverlay").classList.remove("active")}

</script>
</body>
</html>
